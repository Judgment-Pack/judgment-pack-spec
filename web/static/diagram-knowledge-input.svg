<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 268" role="img" aria-labelledby="ki-t ki-d" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="ki-t">Knowledge is an input to a pack, not a parent of it</title>
  <desc id="ki-d">Evidence sources such as a knowledge graph, SQL, APIs, and documents answer what is known. They feed a Judgment Pack, which declares which decision is being made, when it applies, which exception overrides, and when to escalate. The pack produces a decision with rationale.</desc>
  <defs>
    <marker id="ki-arw" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#566466"/>
    </marker>
  </defs>

  <!-- arrows -->
  <g stroke="#566466" stroke-width="1.5" marker-end="url(#ki-arw)">
    <line x1="240" y1="146" x2="297" y2="146"/>
    <line x1="492" y1="146" x2="545" y2="146"/>
  </g>
  <!-- evidence sources -->
  <rect x="24" y="52" width="214" height="182" rx="10" fill="#eef2ed" stroke="#566466" stroke-width="1.5"/>
  <text x="131" y="78" text-anchor="middle" font-size="14" font-weight="600" fill="#152426">Evidence sources</text>
  <text x="131" y="96" text-anchor="middle" font-size="12" fill="#566466">what is known</text>
  <line x1="44" y1="108" x2="218" y2="108" stroke="#d4dcda" stroke-width="1"/>
  <text x="131" y="134" text-anchor="middle" font-size="13" fill="#2b3a38">Knowledge graph</text>
  <text x="131" y="160" text-anchor="middle" font-size="13" fill="#2b3a38">SQL · APIs</text>
  <text x="131" y="186" text-anchor="middle" font-size="13" fill="#2b3a38">Documents</text>
  <text x="131" y="212" text-anchor="middle" font-size="13" fill="#2b3a38">ERP · CRM · data lake</text>

  <!-- judgment pack -->
  <rect x="300" y="78" width="192" height="140" rx="10" fill="#e4f3e7" stroke="#236232" stroke-width="2"/>
  <text x="396" y="104" text-anchor="middle" font-size="15" font-weight="600" fill="#0f2b2e">Judgment Pack</text>
  <text x="396" y="130" text-anchor="middle" font-size="12.5" fill="#20402f">which decision</text>
  <text x="396" y="152" text-anchor="middle" font-size="12.5" fill="#20402f">when it applies</text>
  <text x="396" y="174" text-anchor="middle" font-size="12.5" fill="#20402f">which exception overrides</text>
  <text x="396" y="196" text-anchor="middle" font-size="12.5" fill="#20402f">when to escalate</text>

  <!-- decision -->
  <rect x="548" y="108" width="150" height="80" rx="10" fill="#e7f2f2" stroke="#183b3f" stroke-width="1.5"/>
  <text x="623" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#0f2b2e">Decision</text>
  <text x="623" y="162" text-anchor="middle" font-size="12.5" fill="#3a5a5c">+ rationale</text>
</svg>
