<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 372" role="img" aria-labelledby="tp-t tp-d" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="tp-t">Three properties: specification, reference runtime, products</title>
  <desc id="tp-d">The neutral judgment-pack-spec is the standard. A reference runtime, independent implementations, and products all consume it as peers; none of them owns the standard. The reference runtime feeds a conformance corpus back to the specification.</desc>
  <defs>
    <marker id="tp-arw" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#566466"/>
    </marker>
  </defs>

  <!-- fan-out arrows -->
  <g stroke="#566466" stroke-width="1.5" marker-end="url(#tp-arw)" fill="none">
    <path d="M300,78 C220,120 150,150 122,205"/>
    <line x1="320" y1="80" x2="320" y2="205"/>
    <path d="M340,78 C420,120 490,150 518,205"/>
  </g>

  <!-- the standard -->
  <rect x="176" y="24" width="288" height="54" rx="10" fill="#e4f3e7" stroke="#236232" stroke-width="2"/>
  <text x="320" y="46" text-anchor="middle" font-size="15" font-weight="600" fill="#0f2b2e">judgment-pack-spec</text>
  <text x="320" y="65" text-anchor="middle" font-size="12.5" fill="#2c4a3a">the standard · neutral · normative</text>

  <!-- reference runtime -->
  <rect x="32" y="206" width="180" height="74" rx="9" fill="#e7f2f2" stroke="#183b3f" stroke-width="1.5"/>
  <text x="122" y="238" text-anchor="middle" font-size="14.5" fill="#0f2b2e">Reference runtime</text>
  <text x="122" y="258" text-anchor="middle" font-size="12.5" fill="#3a5a5c">validates today</text>

  <!-- independent implementations -->
  <rect x="230" y="206" width="180" height="74" rx="9" fill="#e7f2f2" stroke="#183b3f" stroke-width="1.5"/>
  <text x="320" y="238" text-anchor="middle" font-size="14.5" fill="#0f2b2e">Independent</text>
  <text x="320" y="258" text-anchor="middle" font-size="14.5" fill="#0f2b2e">implementations</text>

  <!-- products -->
  <rect x="428" y="206" width="180" height="74" rx="9" fill="#eef2ed" stroke="#566466" stroke-width="1.5"/>
  <text x="518" y="234" text-anchor="middle" font-size="14.5" fill="#152426">Products</text>
  <text x="518" y="253" text-anchor="middle" font-size="12" fill="#3a4744">planner · registry ·</text>
  <text x="518" y="269" text-anchor="middle" font-size="12" fill="#3a4744">marketplace</text>

  <!-- caption -->
  <text x="320" y="330" text-anchor="middle" font-size="13" fill="#566466">Peers consume the standard. None of them owns it.</text>
</svg>
