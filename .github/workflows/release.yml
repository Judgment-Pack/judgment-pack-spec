name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify, package, and draft release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Check repository artifacts and static site
        run: python -m unittest discover -s tests -v

      - name: Build immutable release bundles
        run: >-
          python tools/build_release.py
          --tag "${GITHUB_REF_NAME}"
          --commit "${GITHUB_SHA}"
          --output dist

      - name: Create draft prerelease
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/* \
            --draft \
            --prerelease \
            --verify-tag \
            --title "Judgment Pack Specification ${GITHUB_REF_NAME}" \
            --notes-file "releases/${GITHUB_REF_NAME}.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release bundles
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: dist/checksums.txt
